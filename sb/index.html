<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<title>Soundboard</title>
	<style>
		body
		{
			background-color: #1e1e1e;
			margin: 0;
			overflow-x: hidden;	 /* Disable the horizontal scroll bar */
		}
		font, h1
		{
			color: white;
		}
		div
		{
			text-align: center;
			font-family: "Courier New", Courier, monospace;
		}
		table, td
		{
			margin-left: auto;
			margin-right: auto;
			border: 2px solid #fafbfc;
			border-collapse: collapse;
			padding: 6px;
			font-size: 1.8em;
			color: white;
		}
		td:hover
		{
			/* When you hover over a sound board button, it will change to this color */
			background-color:#4d4d4d;
			cursor: pointer;
		}
		#toasty-container
		{
			/* Will also constrains size of image in side the container */
			width: 200px;
  			height: 204px;
			position: relative;
			float: right;
			background-color: transparent;
		}
	</style>
</head>

<body>
	<div>
		<h1 style="cursor: pointer;" onclick="document.getElementById('wuh happun').play()">Soundboard</h1>
	</div>

	<div id="soundboard" onselectstart="return false"><!--Makes the text unselectable-->

				<td onclick="document.getElementById('oh').play()">Oh</td>
				<td onclick="document.getElementById('wrong').play()">wrong</td>
				<td onclick="document.getElementById('fun').play()">fun</td>
			</tr>
			<tr>
				<td onclick="document.getElementById('record').play()">holup</td>
				<td onclick="document.getElementById('vase').play()">&#x26B1</td>

			</tr>

				<!-- <td onclick="document.getElementById('').play()"></td> -->
			</tr>
		</table>
	</div>

	<script>
		/* JS code for toasty animation */
		function toasty_animate()
		{
			var container = document.getElementById("toasty-container");
			document.getElementById("animation").src= ""; 								// Reset the animation
			document.getElementById("animation").src= "toasty.gif";
			container.style.visibility = "visible";										// Make container visible
			setTimeout(function(){document.getElementById('toasty').play();}, 290);		// Wait to play sound
			setTimeout(function(){container.style.visibility = "visible";}, 980);		// Make container invisible
		}
	</script>

	<div id="toasty-container" style="visibility:hidden;">
		<img id="animation" src="" style="width:100%; height:100%;">
	</div>
</body>
</html>
