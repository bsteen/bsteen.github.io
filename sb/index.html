<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<title>Soundboard</title>
	<link rel="icon" type="image/x-icon" href="favicon.png">
	<style>
		body
		{
			background-color: #1e1e1e;
			margin: 0;
			overflow-x: hidden;	 /* Disable the horizontal scroll bar */
		}
		font, h1
		{
			color: white;
		}
		div
		{
			text-align: center;
			font-family: "Courier New", Courier, monospace;
		}
		table, td
		{
			margin-left: auto;
			margin-right: auto;
			border: 2px solid #fafbfc;
			border-collapse: collapse;
			padding: 6px;
			font-size: 1.8em;
			color: white;
		}
		td:hover
		{
			/* When you hover over a sound board button, it will change to this color */
			background-color:#4d4d4d;
			cursor: pointer;
		}
		.toasty-instance
		{
			animation-timing-function: linear;
			animation-iteration-count: 1;
			animation-name: toasty-animation;
			animation-duration: 1100ms;
		}
		@keyframes toasty-animation
		{
			0% {
				right: -200px;
			}
			15% {
				right: 0px;
			}
			85% {
				right: 0px;
			}
			100% {
				right: -200px;
			}
		}

	</style>
</head>

<audio id="bonk" src="bonk.mp3"></audio>

<audio id="jobsdone" src="Jobs Done.mp3"></audio>

<audio id="record" src="record scratch.mp3"></audio>

<audio id="scorn" src="scorn.mp3"></audio>
<audio id="gas" src="gas.mp3"></audio>

<body>
	<div>
		<h1 style="cursor: pointer;" onclick="play_audio('wuh happun')">Soundboard</h1>
	</div>
	<div id="soundboard" onselectstart="return false"> <!--Makes the text unselectable-->
		<table>
			<tr>
				<td onclick="play_audio('bonk')">BONK</td>
				<td onclick="play_audio('boing')">boing</td>
				<td onclick="play_audio('homerun')">&#x1f3cf</td>
				<td onclick="play_audio('lose')">Lose</td>
				<td onclick="play_audio('bruh')">bruh</td>
			</tr>
			<tr>
				<td onclick="play_audio('record')">holup</td>
				<td onclick="play_audio('vase')">&#x1F3FA</td>
				<td onclick="play_audio('wilhelm')">Wilhelm</td>
				<td onclick="play_audio('slide')">slide</td>
				<td onclick="play_audio('omg')">OMG</td>
			</tr>
			<tr>
				<td onclick="play_audio('oh')">Oh</td>
				<td onclick="play_audio('very cool')">Very cool</td>
				<td onclick="play_audio('kill jesta')">&#x1F921</td>
				<td onclick="play_audio('tim')">Tim</td>
				<td onclick="play_audio('yeah')">yeah</td>
			</tr>
			<tr>
				<td onclick="play_audio('do it')">Do it</td>
				<td onclick="play_audio('hoo')">HOO</td>
				<td onclick="play_audio('uhoh')">Uh Oh</td>
				<td onclick="play_audio('johnny test')">test</td>
				<td onclick="play_audio('fun')">fun</td>
			</tr>
			<tr>
				<td onclick="play_audio('wrong')">wrong</td>
				<td onclick="play_audio('oh no')">OH NO</td>
				<td onclick="play_audio('nope')">Nope</td>
				<td onclick="play_audio('oof')">oof</td>
				<td onclick="play_audio('jobsdone')">Job's done</td>
			</tr>
			<tr>
				<td onclick="play_audio('thankyou')">THANK YOU</td>
				<td onclick="play_audio('todd')">Buy it</td>
				<td onclick="toasty_animate();">&#x1f35e</td>
				<td onclick="play_audio('byeah')">byeah</td>
				<td onclick="play_audio('ccc')">CCC</td>
			</tr>
			<tr>
				<td onclick="play_audio('dial')">&#x1f4f1</td>
				<td onclick="play_audio('gas')">gas</td>
				<td onclick="play_audio('scorn')">丂匚ㄖ尺几</td>
				<!-- <td onclick="play_audio('')"></td> -->
			</tr>
		</table>
	</div>

	<script>
		var id_iter = 0;					// Will break after Number.MAX_SAFE_INTEGER?
		var toasty_img = document.createElement("img");
		toasty_img.src = "toasty.png";		// Create original image of toasty; caches image data

		function toasty_animate(){
			// Show toasty animation
			var animation = toasty_img.cloneNode(false);						// Create new image element
			animation.id += `toasty-${id_iter}`;								// Give it a unique ID
			animation.setAttribute("class", "toasty-instance");					// Apply CSS animation to image
			animation.style = "width:200px;height:204px;position:absolute;";	// Make image appear on top of other toasty images
			id_iter += 1;

			setTimeout(function(){play_audio("toasty")}, 275);								// Wait to play sound until midpoint of animation
			setTimeout(function(){document.getElementById(animation.id).remove()}, 1200);	// Remove element from page after animation is done

			document.getElementById("toasty-container").appendChild(animation);				// Add to div in bottom right of screen
		}

		function play_audio(audio_id){
			// Create copy of audio so it can be played overtop of itself, i.e. allows overlapped spamming
			audio = document.getElementById(audio_id).cloneNode(false);
			audio.play();
		}
	</script>
	<div id="toasty-container" style="float:right;"></div>
</body>
</html>
